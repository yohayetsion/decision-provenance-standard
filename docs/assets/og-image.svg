<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Paper background -->
  <rect width="1200" height="630" fill="#F5F5F5"/>
  <!-- Top accent rule -->
  <rect x="0" y="0" width="1200" height="10" fill="#3A5A78"/>

  <!-- Lines-glyph (favicon mark): three horizontal rounded bars. NO seal / ring / shield / checkmark / laurel. -->
  <g transform="translate(96,150)">
    <rect x="0" y="0"  width="120" height="22" rx="11" fill="#3A5A78"/>
    <rect x="0" y="40" width="120" height="22" rx="11" fill="#3A5A78"/>
    <rect x="0" y="80" width="78"  height="22" rx="11" fill="#8FA8C0"/>
  </g>

  <!-- Title: Manrope 800 -->
  <text x="96" y="330" font-family="Manrope, system-ui, sans-serif" font-size="74" font-weight="800" fill="#1A1A1A" letter-spacing="-1">Decision Provenance Standard<tspan font-size="34" baseline-shift="super" fill="#3A5A78">&#8482;</tspan></text>

  <!-- Single accent rule under the title -->
  <rect x="98" y="362" width="320" height="6" rx="3" fill="#3A5A78"/>

  <!-- Sub-line: Source Serif 4 -->
  <text x="96" y="430" font-family="'Source Serif 4', Georgia, serif" font-size="36" font-weight="500" fill="#3F4750">Audit-ready provenance for decisions made by humans and AI together.</text>

  <!-- Micro posture line, bottom -->
  <text x="96" y="560" font-family="Manrope, system-ui, sans-serif" font-size="24" font-weight="600" fill="#3A5A78">Open standard &#183; CC-BY 4.0 &#183; self-declared &#183; not legal advice</text>
</svg>
